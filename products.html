<!DOCTYPE html>
<html>
<head>
    <title>Our Products | Scones, Cupcakes & Jam Tarts</title>
    <meta name="description" content="Browse our bakery products including scones, jam tarts, cupcakes, queen cakes, and melting moments. Freshly baked daily at Mrs Bake Home Bakery.">
    <meta name="keywords" content="bakery products, scones, cupcakes, jam tarts, queen cakes, melting moments, Johannesburg bakery">
    <link rel="stylesheet" href="css/styles.css">
  <style>
    .product {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      text-align: center;
    }
    .search-sort {
      margin: 20px;
      text-align: center;
    }
    input, select {
      padding: 8px;
      margin: 5px;
    }
    #cart {
      border: 2px solid #444;
      padding: 15px;
      margin: 20px;
      border-radius: 5px;
      background: #f9f9f9;
    }
    #cart h2 {
      margin-top: 0;
    }
    .cart-item {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Mrs Bake Home Bakery</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="products.html">Products</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <h2>Our Products</h2>
  <p>Browse our freshly baked goods below. Use the search and sort options to find your favorites!</p>

  <!-- Search and Sort Controls -->
  <div class="search-sort">
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
    <select id="sort" onchange="sortProducts()">
      <option value="name">Sort by Name</option>
      <option value="price">Sort by Price</option>
    </select>
  </div>

  <!-- Product List -->
  <div id="product-list"></div>
</main>

<footer>
  <p>&copy; 2023 Mrs Bake Home Bakery</p>
  <p>Designed By: Olive Masechaba Zwane</p>
</footer>

<script>
  // Product Data
  const products = [
    { name: "Scones", price: "R20 per pack", category: "Bakery"},
    { name: "Jam Tarts", price: "R25 per pack", category: "Pastry" },
    { name: "Cupcakes", price: "R30 per pack", category: "Treats" },
    { name: "Melting Moments", price: "R15 per pack", category: "Biscuits" },
    { name: "Queen Cakes", price: "R18 per pack", category: "Bakery"}
  ];

  // Load Products
  function loadProducts(items) {
    const container = document.getElementById("product-list");
    container.innerHTML = "";
    items.forEach(product => {
      container.innerHTML += `
        <div class="product">
          <h3>${product.name}</h3>
          <p>Price: ${product.price}</p>
          <p>Category: ${product.category}</p>
        </div>
      `;
    });
  }


  // Add to Cart
  function addToCart(index) {
    cart.push(products[index]);
    updateCart();
  }

  // Update Cart Display
  function updateCart() {
    const cartContainer = document.getElementById("cart-items");
    const totalContainer = document.getElementById("cart-total");
    cartContainer.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
      cartContainer.innerHTML += `<div class="cart-item">${item.name} - R${item.price}</div>`;
      total += item.price;
    });

    totalContainer.textContent = total;
  }

  // Search Function
  function searchProducts() {
    const query = document.getElementById("search").value.toLowerCase();
    const filtered = products.filter(product =>
      product.name.toLowerCase().includes(query) ||
      product.category.toLowerCase().includes(query)
    );
    loadProducts(filtered);
  }

  // Sort Function
  function sortProducts() {
    const sortBy = document.getElementById("sort").value;
    let sorted = [...products];

    if (sortBy === "name") {
      sorted.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === "price") {
      sorted.sort((a, b) => a.price - b.price);
    }

    loadProducts(sorted);
  }

  // Initial Load
  window.onload = () => loadProducts(products);
</script>

</body>
</html>
